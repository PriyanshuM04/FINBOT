<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinBot Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Fin<span>Bot</span></div>
    <div class="header-meta">
      <strong id="header-phone">—</strong>
      <span id="header-date">—</span>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">This Month</div>
      <div class="stat-value"><span class="currency">₹</span><span id="stat-month">—</span></div>
      <div class="stat-sub" id="stat-month-count">— transactions</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This Week</div>
      <div class="stat-value"><span class="currency">₹</span><span id="stat-week">—</span></div>
      <div class="stat-sub">last 7 days</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Top Category</div>
      <div class="stat-value" id="stat-top-cat" style="font-size:22px;">—</div>
      <div class="stat-sub" id="stat-top-cat-amt">this month</div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="card-title">Spending by Category</div>
      <div id="chart-pie" style="height:280px;"></div>
    </div>
    <div class="chart-card">
      <div class="card-title">Monthly Trend</div>
      <div id="chart-bar" style="height:280px;"></div>
    </div>
  </div>

  <div class="merchants-card">
    <div class="card-title">Top Merchants This Month</div>
    <div id="merchants-list">
      <div class="loading"><span class="spinner"></span> Loading...</div>
    </div>
  </div>

  <div class="txn-card">
    <div class="card-title">Recent Transactions</div>
    <div id="txn-list">
      <div class="loading"><span class="spinner"></span> Loading...</div>
    </div>
  </div>

</div>

<script src="/static/js/charts.js"></script>
<script src="/static/js/dashboard.js"></script>
</body>
</html>
