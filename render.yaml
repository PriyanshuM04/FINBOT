services:
  # FastAPI Web Service
  - type: web
    name: finbot-api
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: finbot-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

  # Celery Worker
  - type: worker
    name: finbot-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info --pool=solo
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: finbot-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

  # Redis
  - type: redis
    name: finbot-redis
    plan: free
    ipAllowList: []